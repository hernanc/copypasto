name: Copypasto
options:
  bundleIdPrefix: com.copypasto
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
targets:
  Copypasto:
    type: application
    platform: macOS
    sources:
      - Copypasto
    info:
      path: Copypasto/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Copypasto
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.copypasto.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.10"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Copypasto/Info.plist
